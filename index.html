<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      var parts = window.location.pathname.split('/').filter(Boolean);
      var idx = parts.indexOf('invitations');
      if (idx !== -1) {
        var base = document.createElement('base');
        base.href = '/' + parts.slice(0, idx + 1).join('/') + '/';
        document.head.appendChild(base);
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- SEO Meta Tags (populated from config via JS) -->
  <title>Adam &amp; Farah — Wedding Invitation</title>
  <meta name="description" content="You're invited to celebrate the wedding of Adam and Farah.">
  <meta name="keywords" content="wedding, invitation, Adam, Farah, زفاف, دعوة">
  <meta name="author" content="Adam & Farah">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#c9a962">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Adam &amp; Farah — Wedding Invitation">
  <meta property="og:description" content="You're invited to celebrate our special day.">
  <meta property="og:image" content="assets/hero.jpg">
  <meta property="og:url" content="">
  <meta property="og:locale" content="ar_EG">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Adam &amp; Farah — Wedding Invitation">
  <meta name="twitter:description" content="You're invited to celebrate our special day.">
  <meta name="twitter:image" content="assets/hero.jpg">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">

  <!-- Google Fonts — Elegant wedding typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- AOS Animation Library -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Critical layout — ensures intro overlay works even if CSS is delayed -->
  <style id="critical-layout">
    body.intro-active { overflow: hidden; }
    #site-wrapper.site-wrapper--hidden { display: none !important; }
    #intro-scene.intro-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      z-index: 9998;
    }
    #premium-controls.premium-controls {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 10000;
    }
    [dir="rtl"] #premium-controls.premium-controls {
      right: auto;
      left: 1.25rem;
    }
  </style>
</head>
<body class="intro-active">

  <!-- ==================== PREMIUM FLOATING CONTROLS ==================== -->
  <div id="premium-controls" class="premium-controls" aria-label="Site preferences">
    <button type="button" id="theme-toggle" class="control-btn control-btn--theme" aria-label="Toggle dark mode">
      <span class="control-icon" id="theme-icon" aria-hidden="true">🌙</span>
    </button>
    <div class="control-divider" aria-hidden="true"></div>
    <div class="lang-toggle" role="group" aria-label="Language switcher">
      <button type="button" class="lang-btn active" data-lang="ar" aria-pressed="true">AR</button>
      <span class="lang-separator" aria-hidden="true">|</span>
      <button type="button" class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
    </div>
  </div>

  <!-- ==================== LOADING SCREEN ==================== -->
  <div id="preloader" class="preloader" aria-hidden="true">
    <div class="preloader-inner">
      <div class="preloader-rings">
        <span></span><span></span><span></span>
      </div>
      <p class="preloader-text" id="preloader-text">Adam &amp; Farah</p>
      <div class="preloader-bar"><div class="preloader-bar-fill"></div></div>
    </div>
  </div>

  <!-- ==================== CINEMATIC INTRO SCENE ==================== -->
  <section id="intro-scene" class="intro-scene" aria-label="Wedding invitation cinematic intro">
    <!-- Ambient background layers -->
    <div class="intro-bg">
      <div class="intro-gradient"></div>
      <div class="intro-light intro-light--top"></div>
      <div class="intro-light intro-light--left"></div>
      <div class="intro-light intro-light--right"></div>
      <div class="intro-vignette"></div>
      <canvas id="intro-particles" class="intro-particles" aria-hidden="true"></canvas>
      <div id="intro-sparkles" class="intro-sparkles" aria-hidden="true"></div>
    </div>

    <!-- Camera zoom container -->
    <div class="intro-camera" id="intro-camera">
      <!-- Luxury wedding arch & door -->
      <div class="intro-arch-wrap">
        <div class="intro-arch">
          <div class="arch-curve"></div>
          <div class="arch-pillar arch-pillar--left"></div>
          <div class="arch-pillar arch-pillar--right"></div>
        </div>

        <!-- Floral decorations -->
        <div class="intro-florals intro-florals--left" aria-hidden="true">
          <span class="floral-leaf"></span><span class="floral-leaf"></span><span class="floral-bloom"></span>
        </div>
        <div class="intro-florals intro-florals--right" aria-hidden="true">
          <span class="floral-leaf"></span><span class="floral-leaf"></span><span class="floral-bloom"></span>
        </div>

        <!-- 3D Door -->
        <div class="door-scene">
          <div class="door-glow" id="door-glow"></div>
          <div class="door-interior">
            <div class="door-interior-light"></div>
          </div>
          <div class="door-frame">
            <div class="door-panel door-panel--left" id="door-left">
              <div class="door-panel-inner">
                <div class="door-carving"></div>
                <div class="door-handle door-handle--left"></div>
              </div>
            </div>
            <div class="door-panel door-panel--right" id="door-right">
              <div class="door-panel-inner">
                <div class="door-carving"></div>
                <div class="door-handle door-handle--right"></div>
              </div>
            </div>
          </div>
          <div class="door-threshold"></div>
        </div>
      </div>
    </div>

    <!-- Couple names & CTA (revealed after door opens) -->
    <div class="intro-reveal" id="intro-reveal">
      <div class="intro-names">
        <span class="intro-name" id="intro-groom-name">Adam</span>
        <span class="intro-amp">&amp;</span>
        <span class="intro-name" id="intro-bride-name">Farah</span>
      </div>
      <p class="intro-tagline" id="intro-tagline">We invite you to celebrate our wedding</p>
      <button type="button" class="btn-intro-gold" id="btn-open-invitation">
        <span id="intro-open-text">Open Invitation</span>
        <i class="fas fa-chevron-down"></i>
      </button>
    </div>

    <!-- Enter with music — user must click to start -->
    <button type="button" class="btn-enter-music" id="btn-enter-music">
      <span class="btn-enter-music-icon">🎵</span>
      <span id="btn-enter-music-text">Enter With Music</span>
    </button>
  </section>

  <!-- ==================== MAIN SITE (hidden until intro completes) ==================== -->
  <div id="site-wrapper" class="site-wrapper site-wrapper--hidden" aria-hidden="true">

  <!-- ==================== FLOATING MUSIC PLAYER ==================== -->
  <button type="button" id="music-toggle" class="music-btn" aria-label="Toggle background music" title="تشغيل الموسيقى">
    <i class="fas fa-music" id="music-icon"></i>
    <span class="music-pulse"></span>
  </button>
  <audio id="bg-music" loop preload="none">
    <source src="assets/music.mp3" type="audio/mpeg">
  </audio>

  <!-- ==================== FLOATING WHATSAPP ==================== -->
  <a href="#" id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener noreferrer" aria-label="Contact us on WhatsApp">
    <i class="fab fa-whatsapp"></i>
  </a>

  <!-- ==================== LIGHTBOX (Gallery) ==================== -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image gallery lightbox" hidden>
    <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Close lightbox">
      <i class="fas fa-times"></i>
    </button>
    <button type="button" class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous image">
      <i class="fas fa-chevron-right"></i>
    </button>
    <img src="" alt="" id="lightbox-img" class="lightbox-img">
    <button type="button" class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next image">
      <i class="fas fa-chevron-left"></i>
    </button>
  </div>

  <main id="main-content">

    <!-- ==================== HERO SECTION ==================== -->
    <header id="hero" class="hero-section">
      <div class="hero-parallax" id="hero-parallax"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content container text-center">
        <p class="hero-subtitle" data-aos="fade-down" data-aos-duration="1000" id="hero-subtitle"></p>
        <h1 class="hero-names" data-aos="zoom-in" data-aos-duration="1200" data-aos-delay="200" id="hero-names"></h1>
        <div class="hero-divider" data-aos="fade-up" data-aos-delay="400">
          <span class="divider-ornament"><i class="fas fa-heart"></i></span>
        </div>
        <p class="hero-date" data-aos="fade-up" data-aos-delay="500" id="hero-date"></p>
        <p class="hero-message" data-aos="fade-up" data-aos-delay="600" id="hero-message"></p>
        <a href="#rsvp" class="btn btn-gold hero-cta" data-aos="fade-up" data-aos-delay="800" id="hero-cta"></a>
      </div>
      <a href="#countdown" class="hero-scroll" aria-label="Scroll down">
        <span class="scroll-mouse"></span>
      </a>
    </header>

    <!-- ==================== COUNTDOWN SECTION ==================== -->
    <section id="countdown" class="section countdown-section">
      <div class="container">
        <div class="section-header text-center" data-aos="fade-up">
          <span class="section-label" id="countdown-label"></span>
          <h2 class="section-title" id="countdown-title"></h2>
          <div class="title-ornament"><span></span><i class="fas fa-gem"></i><span></span></div>
        </div>
        <div class="countdown-wrapper" data-aos="zoom-in" data-aos-delay="200">
          <div class="row g-3 g-md-4 justify-content-center" id="countdown-timer">
            <div class="col-6 col-md-3">
              <div class="countdown-box">
                <span class="countdown-number" id="cd-days">00</span>
                <span class="countdown-label-unit" id="cd-days-label"></span>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="countdown-box">
                <span class="countdown-number" id="cd-hours">00</span>
                <span class="countdown-label-unit" id="cd-hours-label"></span>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="countdown-box">
                <span class="countdown-number" id="cd-minutes">00</span>
                <span class="countdown-label-unit" id="cd-minutes-label"></span>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="countdown-box">
                <span class="countdown-number" id="cd-seconds">00</span>
                <span class="countdown-label-unit" id="cd-seconds-label"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ==================== BRIDE & GROOM SECTION ==================== -->
    <section id="couple" class="section couple-section">
      <div class="container">
        <div class="section-header text-center" data-aos="fade-up">
          <span class="section-label" id="couple-label"></span>
          <h2 class="section-title" id="couple-title"></h2>
          <div class="title-ornament"><span></span><i class="fas fa-heart"></i><span></span></div>
        </div>
        <div class="row g-4 align-items-stretch justify-content-center">
          <div class="col-md-5 col-lg-4" data-aos="fade-left" data-aos-delay="100">
            <article class="couple-card" id="bride-card">
              <div class="couple-image-wrap">
                <img src="" alt="" class="couple-image" id="bride-image" loading="lazy">
                <div class="couple-image-overlay"></div>
              </div>
              <div class="couple-info">
                <h3 class="couple-name" id="bride-name"></h3>
                <p class="couple-role" id="bride-role"></p>
                <p class="couple-desc" id="bride-desc"></p>
              </div>
            </article>
          </div>
          <div class="col-md-2 d-none d-md-flex align-items-center justify-content-center" data-aos="zoom-in">
            <div class="couple-ampersand">&amp;</div>
          </div>
          <div class="col-md-5 col-lg-4" data-aos="fade-right" data-aos-delay="100">
            <article class="couple-card" id="groom-card">
              <div class="couple-image-wrap">
                <img src="" alt="" class="couple-image" id="groom-image" loading="lazy">
                <div class="couple-image-overlay"></div>
              </div>
              <div class="couple-info">
                <h3 class="couple-name" id="groom-name"></h3>
                <p class="couple-role" id="groom-role"></p>
                <p class="couple-desc" id="groom-desc"></p>
              </div>
            </article>
          </div>
        </div>
      </div>
    </section>

    <!-- ==================== OUR STORY TIMELINE ==================== -->
    <section id="story" class="section story-section">
      <div class="container">
        <div class="section-header text-center" data-aos="fade-up">
          <span class="section-label" id="story-label"></span>
          <h2 class="section-title" id="story-title"></h2>
          <div class="title-ornament"><span></span><i class="fas fa-book-open"></i><span></span></div>
        </div>
        <div class="timeline" id="story-timeline"></div>
      </div>
    </section>

    <!-- ==================== EVENT DETAILS ==================== -->
    <section id="details" class="section details-section">
      <div class="container">
        <div class="section-header text-center" data-aos="fade-up">
          <span class="section-label" id="details-label"></span>
          <h2 class="section-title" id="details-title"></h2>
          <div class="title-ornament"><span></span><i class="fas fa-calendar-check"></i><span></span></div>
        </div>
        <div class="row g-4" id="event-details-grid"></div>
      </div>
    </section>

    <!-- ==================== ADD TO CALENDAR ==================== -->
    <section id="calendar" class="section calendar-section">
      <div class="container">
        <div class="calendar-card text-center" data-aos="fade-up">
          <h3 class="calendar-title" id="calendar-title"></h3>
          <p class="calendar-subtitle" id="calendar-subtitle"></p>
          <div class="calendar-buttons">
            <button type="button" class="btn btn-gold" id="btn-google-calendar">
              <i class="fab fa-google me-2"></i><span id="btn-google-text"></span>
            </button>
            <button type="button" class="btn btn-outline-gold" id="btn-download-ics">
              <i class="fas fa-download me-2"></i><span id="btn-ics-text"></span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- ==================== GALLERY ==================== -->
    <section id="gallery" class="section gallery-section">
      <div class="container">
        <div class="section-header text-center" data-aos="fade-up">
          <span class="section-label" id="gallery-label"></span>
          <h2 class="section-title" id="gallery-title"></h2>
          <div class="title-ornament"><span></span><i class="fas fa-camera"></i><span></span></div>
        </div>
        <div class="row g-3 g-md-4" id="gallery-grid"></div>
      </div>
    </section>

    <!-- ==================== GOOGLE MAPS ==================== -->
    <section id="location" class="section map-section">
      <div class="container">
        <div class="section-header text-center" data-aos="fade-up">
          <span class="section-label" id="map-label"></span>
          <h2 class="section-title" id="map-title"></h2>
          <div class="title-ornament"><span></span><i class="fas fa-map-marker-alt"></i><span></span></div>
        </div>
        <div class="map-wrapper" data-aos="zoom-in" data-aos-delay="200">
          <iframe id="map-iframe" title="Wedding venue location" loading="lazy" referrerpolicy="no-referrer-when-downgrade" allowfullscreen></iframe>
        </div>
        <p class="map-address text-center mt-4" id="map-address" data-aos="fade-up"></p>
      </div>
    </section>

    <!-- ==================== RSVP FORM ==================== -->
    <section id="rsvp" class="section rsvp-section">
      <div class="container">
        <div class="section-header text-center" data-aos="fade-up">
          <span class="section-label" id="rsvp-label"></span>
          <h2 class="section-title" id="rsvp-title"></h2>
          <div class="title-ornament"><span></span><i class="fas fa-envelope-open-text"></i><span></span></div>
          <p class="section-desc" id="rsvp-desc"></p>
        </div>
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <form id="rsvp-form" class="rsvp-form" data-aos="fade-up" data-aos-delay="200" novalidate>
              <div class="mb-4">
                <label for="guest-name" class="form-label" id="label-guest-name"></label>
                <input type="text" class="form-control form-control-lg" id="guest-name" required autocomplete="name">
              </div>
              <div class="mb-4">
                <label for="guest-phone" class="form-label" id="label-guest-phone"></label>
                <input type="tel" class="form-control form-control-lg" id="guest-phone" required autocomplete="tel" dir="ltr">
              </div>
              <div class="mb-4">
                <label for="guest-count" class="form-label" id="label-guest-count"></label>
                <select class="form-select form-select-lg" id="guest-count" required></select>
              </div>
              <div class="mb-4">
                <label class="form-label" id="label-attendance"></label>
                <div class="attendance-options" id="attendance-options"></div>
              </div>
              <div class="rsvp-buttons">
                <button type="button" class="btn btn-gold btn-lg" id="btn-confirm">
                  <i class="fas fa-check-circle me-2"></i><span id="btn-confirm-text"></span>
                </button>
                <button type="button" class="btn btn-outline-gold btn-lg" id="btn-decline">
                  <i class="fas fa-times-circle me-2"></i><span id="btn-decline-text"></span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <!-- ==================== TESTIMONIALS CAROUSEL ==================== -->
    <section id="wishes" class="section wishes-section">
      <div class="container">
        <div class="section-header text-center" data-aos="fade-up">
          <span class="section-label" id="wishes-label"></span>
          <h2 class="section-title" id="wishes-title"></h2>
          <div class="title-ornament"><span></span><i class="fas fa-quote-right"></i><span></span></div>
        </div>
        <div id="wishes-carousel" class="carousel slide wishes-carousel" data-bs-ride="carousel" data-aos="fade-up" data-aos-delay="200">
          <div class="carousel-indicators" id="wishes-indicators"></div>
          <div class="carousel-inner" id="wishes-slides"></div>
          <button class="carousel-control-prev" type="button" data-bs-target="#wishes-carousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#wishes-carousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ==================== FAQ ACCORDION ==================== -->
    <section id="faq" class="section faq-section">
      <div class="container">
        <div class="section-header text-center" data-aos="fade-up">
          <span class="section-label" id="faq-label"></span>
          <h2 class="section-title" id="faq-title"></h2>
          <div class="title-ornament"><span></span><i class="fas fa-question-circle"></i><span></span></div>
        </div>
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="accordion faq-accordion" id="faq-accordion" data-aos="fade-up" data-aos-delay="200"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ==================== FOOTER ==================== -->
  <footer class="site-footer">
    <div class="container text-center">
      <div class="footer-ornament"><i class="fas fa-heart"></i></div>
      <h3 class="footer-names" id="footer-names"></h3>
      <p class="footer-date" id="footer-date"></p>
      <p class="footer-tagline" id="footer-tagline"></p>
      <div class="footer-social" id="footer-social"></div>
      <p class="footer-copy" id="footer-copy"></p>
    </div>
  </footer>

  </div><!-- /#site-wrapper -->

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <!-- AOS Animation Library -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <!-- Custom JavaScript -->
  <script src="js/script.js"></script>
</body>
</html>
